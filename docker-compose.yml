services:
  web:
    build: .
    container_name: miha-shamanit
    ports:
      - "8080:8080"
    environment:
      APP_NAME: "Мишаня шаманит"
      APP_DOMAIN: "miha.vovengo.com"
      PUBLIC_BASE_URL: "http://localhost:8080"
      GEN_PROVIDER: "${GEN_PROVIDER:-mock}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_IMAGE_MODEL: "${OPENAI_IMAGE_MODEL:-gpt-image-1}"
      OPENAI_IMAGE_SIZE: "${OPENAI_IMAGE_SIZE:-1024x1024}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
